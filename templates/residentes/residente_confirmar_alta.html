{% extends 'base.html' %}
{% block title %}GammelCare — Dar de Alta{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold mb-0" style="color:#1F4E79;">
    <i class="bi bi-person-dash me-2"></i>Dar de Alta al Residente
  </h4>
  <a href="{% url 'residente_lista' %}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Volver
  </a>
</div>

<div class="card card-gc" style="max-width:550px;">
  <div class="card-body p-4">
    <div class="alert alert-warning mb-4">
      <i class="bi bi-exclamation-triangle me-2"></i>
      Está a punto de dar de alta a <strong>{{ nombre }}</strong>.
      Esta acción liberará la cama asignada y cerrará la asignación activa.
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="mb-4">
        <label class="form-label fw-semibold">Motivo de retiro</label>
        <select name="motivo_retiro" class="form-select" required>
          <option value="">Seleccione el motivo</option>
          {% for valor, etiqueta in motivos %}
          <option value="{{ valor }}">{{ etiqueta }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-warning">
          <i class="bi bi-check-circle me-1"></i>Confirmar Alta
        </button>
        <a href="{% url 'residente_lista' %}" class="btn btn-outline-secondary">
          Cancelar
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
