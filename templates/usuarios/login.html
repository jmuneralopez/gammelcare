<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GammelCare — Iniciar Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --gc-dark: #1F4E79;
      --gc-mid:  #2E75B6;
      --gc-light: #D6E4F0;
    }
    body {
      background: linear-gradient(135deg, var(--gc-dark) 0%, var(--gc-mid) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
    }
    .login-logo {
      color: var(--gc-dark);
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -1px;
    }
    .login-logo i { color: var(--gc-mid); }
    .login-subtitle {
      color: #6c757d;
      font-size: 0.9rem;
      margin-bottom: 1.8rem;
    }
    .form-control:focus {
      border-color: var(--gc-mid);
      box-shadow: 0 0 0 0.2rem rgba(46,117,182,0.18);
    }
    .btn-login {
      background-color: var(--gc-dark);
      color: #fff;
      border: none;
      width: 100%;
      padding: 0.6rem;
      font-size: 1rem;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .btn-login:hover { background-color: var(--gc-mid); color: #fff; }
    .divider {
      border-top: 1px solid var(--gc-light);
      margin: 1.5rem 0 1rem;
    }
    .footer-text {
      font-size: 0.78rem;
      color: #adb5bd;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="login-card">
  <!-- Logo -->
  <div class="text-center mb-1">
    <div class="login-logo">
      <i class="bi bi-heart-pulse-fill"></i> GammelCare
    </div>
    <div class="login-subtitle">Sistema de Gestión para Hogares Geriátricos</div>
  </div>

  <!-- Errores -->
  {% if error %}
  <div class="alert alert-danger py-2 px-3" style="font-size:0.88rem;">
    <i class="bi bi-exclamation-triangle-fill me-1"></i>
    Usuario o contraseña incorrectos. Intente nuevamente.
  </div>
{% endif %}

  <!-- Formulario -->
  <form method="post" autocomplete="off">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-semibold" style="font-size:0.9rem;">
        <i class="bi bi-person me-1"></i>Usuario
      </label>
      <input
        type="text"
        name="username"
        class="form-control"
        placeholder="Ingrese su usuario"
        autofocus
        required
      >
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold" style="font-size:0.9rem;">
        <i class="bi bi-lock me-1"></i>Contraseña
      </label>
      <div class="input-group">
        <input
          type="password"
          name="password"
          id="passwordField"
          class="form-control"
          placeholder="Ingrese su contraseña"
          required
        >
        <button
          class="btn btn-outline-secondary"
          type="button"
          onclick="togglePassword()"
          tabindex="-1"
        >
          <i class="bi bi-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>
    <button type="submit" class="btn-login">
      <i class="bi bi-box-arrow-in-right me-2"></i>Iniciar Sesión
    </button>
  </form>

  <div class="divider"></div>
  <div class="footer-text">
    Fundación Universitaria Compensar &nbsp;·&nbsp; Práctica II<br>
    Acceso restringido a personal autorizado
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function togglePassword() {
    const field = document.getElementById('passwordField');
    const icon  = document.getElementById('eyeIcon');
    if (field.type === 'password') {
      field.type = 'text';
      icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
      field.type = 'password';
      icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
  }
</script>
</body>
</html>
