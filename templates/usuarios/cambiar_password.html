{% extends 'base.html' %}
{% block title %}GammelCare — Cambiar Contraseña{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold mb-0" style="color:#1F4E79;">
    <i class="bi bi-key me-2"></i>Cambiar Contraseña
  </h4>
  <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Volver
  </a>
</div>

<div class="card card-gc" style="max-width:480px;">
  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Contraseña actual</label>
        <input type="password" name="password_actual" class="form-control"
               placeholder="Ingrese su contraseña actual" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Nueva contraseña</label>
        <input type="password" name="password_nueva" class="form-control"
               placeholder="Mínimo 8 caracteres" required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Confirmar nueva contraseña</label>
        <input type="password" name="password_confirmar" class="form-control"
               placeholder="Repita la nueva contraseña" required>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-gc">
          <i class="bi bi-check-circle me-1"></i>Cambiar contraseña
        </button>
        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">
          Cancelar
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
