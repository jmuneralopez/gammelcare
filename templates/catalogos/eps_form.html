{% extends 'base.html' %}
{% block title %}GammelCare — {{ titulo }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold mb-0" style="color:#1F4E79;">
    <i class="bi bi-hospital me-2"></i>{{ titulo }}
  </h4>
  <a href="{% url 'eps_lista' %}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Volver
  </a>
</div>

<div class="card card-gc" style="max-width:550px;">
  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Nombre</label>
        <input type="text" name="nombre" class="form-control"
               value="{{ obj.nombre|default:'' }}" required
               placeholder="Nombre de la EPS">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Código</label>
        <input type="text" name="codigo" class="form-control"
               value="{{ obj.codigo|default:'' }}"
               placeholder="Código EPS (opcional)">
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Teléfono</label>
        <input type="text" name="telefono" class="form-control"
               value="{{ obj.telefono|default:'' }}"
               placeholder="Teléfono de contacto">
      </div>
      {% if obj %}
      <div class="mb-4">
        <div class="form-check">
          <input type="checkbox" name="activo" class="form-check-input"
                 id="activo" {% if obj.activo %}checked{% endif %}>
          <label class="form-check-label fw-semibold ms-2" for="activo">
            EPS activa
          </label>
        </div>
      </div>
      {% endif %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-gc">
          <i class="bi bi-check-circle me-1"></i>{{ accion }}
        </button>
        <a href="{% url 'eps_lista' %}" class="btn btn-outline-secondary">
          Cancelar
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
