{% extends 'base.html' %}
{% block title %}GammelCare — {{ titulo }}{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="fw-bold mb-0" style="color:#1F4E79;">
    <i class="bi bi-grid me-2"></i>{{ titulo }}
  </h4>
  <a href="{% url 'departamento_lista' %}" class="btn btn-outline-secondary">
    <i class="bi bi-arrow-left me-1"></i>Volver
  </a>
</div>

<div class="card card-gc" style="max-width:600px;">
  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="mb-3">
        <label class="form-label fw-semibold" style="font-size:0.9rem;">
          {{ field.label }}
        </label>
        {{ field }}
        {% if field.errors %}
          <div class="text-danger" style="font-size:0.83rem;">
            {{ field.errors|join:", " }}
          </div>
        {% endif %}
      </div>
      {% endfor %}
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-gc">
          <i class="bi bi-check-circle me-1"></i>{{ accion }}
        </button>
        <a href="{% url 'departamento_lista' %}" class="btn btn-outline-secondary">
          Cancelar
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
